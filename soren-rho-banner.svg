<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1128 191" width="1128" height="191">
  <defs>
    <linearGradient id="b-bg" x1="0" y1="0" x2="1" y2="0.3">
      <stop offset="0%" stop-color="#070D18"/>
      <stop offset="50%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#0F1E32"/>
    </linearGradient>

    <!-- Light beam fading left -->
    <linearGradient id="ray1" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#D4935A" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#D4935A" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ray2" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#D4935A" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#D4935A" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="b-beacon" cx="985" cy="36" r="35" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E0AD7A" stop-opacity="0.8"/>
      <stop offset="40%" stop-color="#D4935A" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#D4935A" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="b-ambient" cx="985" cy="50" r="130" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#D4935A" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#D4935A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1128" height="191" fill="url(#b-bg)"/>

  <!-- Stars scattered across the sky -->
  <circle cx="65" cy="22" r="1" fill="#fff" opacity="0.2"/>
  <circle cx="140" cy="55" r="0.7" fill="#fff" opacity="0.12"/>
  <circle cx="210" cy="14" r="0.9" fill="#fff" opacity="0.18"/>
  <circle cx="305" cy="42" r="1.1" fill="#fff" opacity="0.22"/>
  <circle cx="390" cy="20" r="0.6" fill="#fff" opacity="0.1"/>
  <circle cx="470" cy="58" r="0.8" fill="#fff" opacity="0.15"/>
  <circle cx="540" cy="10" r="1" fill="#fff" opacity="0.2"/>
  <circle cx="620" cy="48" r="0.7" fill="#fff" opacity="0.1"/>
  <circle cx="700" cy="18" r="0.9" fill="#fff" opacity="0.16"/>
  <circle cx="780" cy="52" r="0.6" fill="#fff" opacity="0.08"/>
  <circle cx="840" cy="12" r="0.8" fill="#fff" opacity="0.14"/>
  <circle cx="920" cy="28" r="0.5" fill="#fff" opacity="0.1"/>
  <circle cx="1060" cy="18" r="0.7" fill="#fff" opacity="0.12"/>
  <circle cx="1100" cy="50" r="0.5" fill="#fff" opacity="0.08"/>
  <circle cx="160" cy="38" r="0.5" fill="#fff" opacity="0.06"/>
  <circle cx="430" cy="35" r="0.6" fill="#fff" opacity="0.08"/>
  <circle cx="580" cy="30" r="0.7" fill="#fff" opacity="0.1"/>

  <!-- === LIGHT BEAMS sweeping left from lighthouse === -->
  <!-- Upper beam (strong) -->
  <polygon points="985,36 80,0 80,12 970,33" fill="url(#ray1)"/>
  <!-- Middle beam -->
  <polygon points="985,36 180,20 180,38 972,39" fill="url(#ray2)"/>
  <!-- Lower beam (softer) -->
  <polygon points="985,38 280,42 280,58 975,42" fill="url(#ray2)" opacity="0.7"/>
  <!-- Faint wide sweep -->
  <polygon points="985,36 0,5 0,25 970,34" fill="#D4935A" opacity="0.02"/>

  <!-- Ambient glow around lighthouse area -->
  <circle cx="985" cy="50" r="130" fill="url(#b-ambient)"/>

  <!-- === LIGHTHOUSE (right side) === -->

  <!-- Sandy base -->
  <ellipse cx="985" cy="163" rx="36" ry="7" fill="#D4935A" opacity="0.18"/>

  <!-- Tower body -->
  <path d="M977,72 L972,160 L998,160 L993,72 Z" fill="#2B6CB0"/>

  <!-- White stripe -->
  <path d="M975,100 L974,130 L996,130 L995,100 Z" fill="#DFE5EB"/>

  <!-- Gallery platform -->
  <rect x="973" y="66" width="24" height="6" rx="1.5" fill="#1E4F82"/>
  <!-- Gallery rail posts -->
  <line x1="978" y1="66" x2="978" y2="68.5" stroke="#4A8DD4" stroke-width="0.8" opacity="0.4"/>
  <line x1="985" y1="66" x2="985" y2="68.5" stroke="#4A8DD4" stroke-width="0.8" opacity="0.4"/>
  <line x1="992" y1="66" x2="992" y2="68.5" stroke="#4A8DD4" stroke-width="0.8" opacity="0.4"/>

  <!-- Lantern room -->
  <rect x="978" y="50" width="14" height="16" rx="1.5" fill="#DFE5EB" stroke="#2B6CB0" stroke-width="0.8"/>
  <rect x="979" y="51" width="12" height="14" rx="1" fill="#E0AD7A" opacity="0.1"/>
  <!-- Lantern panes -->
  <line x1="982" y1="51.5" x2="982" y2="64.5" stroke="#2B6CB0" stroke-width="0.5" opacity="0.25"/>
  <line x1="985" y1="51.5" x2="985" y2="64.5" stroke="#2B6CB0" stroke-width="0.5" opacity="0.25"/>
  <line x1="988" y1="51.5" x2="988" y2="64.5" stroke="#2B6CB0" stroke-width="0.5" opacity="0.25"/>

  <!-- Dome -->
  <path d="M979,50 Q979,44 985,38 Q991,44 991,50 Z" fill="#1E4F82"/>

  <!-- Spire -->
  <line x1="985" y1="38" x2="985" y2="31" stroke="#1E4F82" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="985" cy="30" r="1.5" fill="#1E4F82"/>

  <!-- Beacon glow -->
  <circle cx="985" cy="36" r="35" fill="url(#b-beacon)"/>

  <!-- Beacon light -->
  <circle cx="985" cy="36" r="5" fill="#E0AD7A"/>
  <circle cx="985" cy="36" r="2.5" fill="#FFF8F0" opacity="0.95"/>
  <circle cx="985" cy="35.5" r="1.2" fill="#fff" opacity="0.6"/>

  <!-- === SUBTLE WAVES AT BOTTOM === -->
  <path d="M0,180 Q70,173 140,180 Q210,187 280,180 Q350,173 420,180 Q490,187 560,180 Q630,173 700,180 Q770,187 840,180 Q910,173 980,180 Q1050,187 1128,180 L1128,191 L0,191 Z" fill="#2B6CB0" opacity="0.07"/>
  <path d="M0,184 Q60,178 120,184 Q180,190 240,184 Q300,178 360,184 Q420,190 480,184 Q540,178 600,184 Q660,190 720,184 Q780,178 840,184 Q900,190 960,184 Q1020,178 1080,184 Q1128,190 1128,184 L1128,191 L0,191 Z" fill="#2B6CB0" opacity="0.04"/>

  <!-- Bottom accent line -->
  <rect x="0" y="189.5" width="1128" height="1.5" fill="#2B6CB0" opacity="0.12"/>
</svg>
